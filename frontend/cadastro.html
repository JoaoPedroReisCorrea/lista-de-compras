<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Produto - Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>📦 Gerenciador de Produtos</h1>
      <nav>
        <a href="index.html">Listagem</a>
        <a href="cadastro.html" class="ativo">Novo Produto</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <!-- Alerta de mensagens -->
      <div id="alerta" class="alerta"></div>

      <!-- Seção de Cadastro -->
      <section>
        <h2 style="text-align: center; margin-bottom: 2rem; color: #2d3436;">Cadastrar Novo Produto</h2>
        
        <form id="formulario-produto" class="formulario">
          <!-- Campo Nome -->
          <div class="form-grupo">
            <label for="nome">Nome do Produto *</label>
            <input 
              type="text" 
              id="nome" 
              name="nome" 
              placeholder="Ex: Notebook Dell"
              required
            >
          </div>

          <!-- Campo Categoria -->
          <div class="form-grupo">
            <label for="categoria">Categoria *</label>
            <select id="categoria" name="categoria" required>
              <option value="">-- Selecione uma categoria --</option>
              <option value="Eletrônicos">Eletrônicos</option>
              <option value="Livros">Livros</option>
              <option value="Acessórios">Acessórios</option>
              <option value="Roupas">Roupas</option>
              <option value="Casa">Casa</option>
              <option value="Esportes">Esportes</option>
              <option value="Alimentos">Alimentos</option>
              <option value="Beleza">Beleza</option>
              <option value="Outro">Outro</option>
            </select>
          </div>

          <!-- Campo Descrição -->
          <div class="form-grupo">
            <label for="descricao">Descrição</label>
            <textarea 
              id="descricao" 
              name="descricao" 
              placeholder="Descreva o produto (opcional)"
            ></textarea>
          </div>

          <!-- Botões -->
          <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primario btn-full">
              ✓ Cadastrar Produto
            </button>
            <a href="index.html" class="btn btn-secundario btn-full">
              ← Voltar
            </a>
          </div>
        </form>
      </section>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Sistema de Gerenciamento de Produtos. Todos os direitos reservados.</p>
  </footer>

  <script src="api.js"></script>
  <script src="cadastro.js"></script>
</body>
</html>
